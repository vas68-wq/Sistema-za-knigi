{% extends "base.html" %}

{% block title %}Списък с книги - Библиотечна система{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Към таблото
    </a>
    <h1 class="mb-0 mx-auto"><i class="bi bi-journal-bookmark-fill"></i> Списък с книги</h1>
    
    <div>
        <a href="{{ url_for('books.import_books_page') }}" class="btn btn-info"><i class="bi bi-upload"></i> Импорт</a>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addBookModal">
            <i class="bi bi-plus-circle-fill"></i> Нова книга
        </button>
    </div>
</div>

<div class="mb-4">
    <div class="input-group">
        <input type="text" id="search-input" class="form-control" placeholder="Търси по заглавие, автор, инв. номер..." autofocus>
        <span class="input-group-text"><i class="bi bi-search"></i></span>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Инв. №</th>
                <th>Заглавие</th>
                <th>Автор</th>
                <th>Година</th>
                <th>Жанр</th>
                <th class="text-center">Действия</th>
            </tr>
        </thead>
        <tbody id="books-tbody">
            <tr>
                <td colspan="6" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<nav id="pagination-nav" aria-label="Page navigation"></nav>

<div class="modal fade" id="addBookModal" tabindex="-1" aria-labelledby="addBookModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addBookModalLabel">Добавяне на нова книга</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form action="{{ url_for('books.add_book_action') }}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label for="inv_number" class="form-label">Инвентарен номер</label><input type="text" class="form-control" id="inv_number" name="inv_number" required></div>
                        <div class="col-md-6 mb-3"><label for="isbn" class="form-label">ISBN</label><input type="text" class="form-control" id="isbn" name="isbn"></div>
                    </div>
                    <div class="mb-3"><label for="title" class="form-label">Заглавие</label><input type="text" class="form-control" id="title" name="title" required></div>
                    <div class="mb-3"><label for="author" class="form-label">Автор</label><input type="text" class="form-control" id="author" name="author" required></div>
                    <div class="row">
                         <div class="col-md-6 mb-3"><label for="genre" class="form-label">Жанр</label><input class="form-control" list="genresDatalist" id="genre" name="genre" placeholder="Изберете или напишете нов..."><datalist id="genresDatalist"></datalist></div>
                        <div class="col-md-6 mb-3"><label for="publish_year" class="form-label">Година</label><input type="number" class="form-control" id="publish_year" name="publish_year"></div>
                    </div>
                     <div class="row">
                        <div class="col-md-6 mb-3"><label for="price" class="form-label">Цена (лв.)</label><input type="text" class="form-control" id="price" name="price" pattern="[0-9]+([,\.][0-9]{1,2})?"></div>
                        <div class="col-md-6 mb-3 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" id="is_donation" name="is_donation" value="1"><label class="form-check-label" for="is_donation">Дарение</label></div></div>
                    </div>
                    <div class="mb-3"><label for="cover_image" class="form-label">Корица</label><input class="form-control" type="file" id="cover_image" name="cover_image" accept="image/*"></div>
                    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отказ</button><button type="submit" class="btn btn-primary">Запази</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const searchInput = document.getElementById('search-input');
    const tableBody = document.getElementById('books-tbody');
    const paginationNav = document.getElementById('pagination-nav');
    const genresDatalist = document.getElementById('genresDatalist');
    const apiEndpoint = "{{ url_for('books.api_books') }}";

    let currentQuery = '';
    let currentPage = 1;

    function fetchAndRenderBooks(query, page) {
        currentQuery = query;
        currentPage = page;
        tableBody.innerHTML = `<tr><td colspan="6" class="text-center"><div class="spinner-border text-primary" role="status"></div></td></tr>`;

        fetch(`${apiEndpoint}?query=${encodeURIComponent(query)}&page=${page}`)
            .then(response => response.json())
            .then(data => {
                renderTable(data.books);
                renderPagination(data.pagination);
                updateGenres(data.genres);
            })
            .catch(error => {
                console.error('Грешка при зареждане на данните:', error);
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Възникна грешка.</td></tr>`;
            });
    }

    function renderTable(books) {
        tableBody.innerHTML = '';
        if (books.length === 0) {
            const message = currentQuery ? `Няма намерени резултати за "${currentQuery}".` : 'Няма добавени книги.';
            tableBody.innerHTML = `<tr><td colspan="6" class="text-center">${message}</td></tr>`;
            return;
        }

        books.forEach(book => {
            const currentFullPath = `/books?page=${currentPage}&query=${encodeURIComponent(currentQuery)}`;
            const rowHTML = `
                <tr>
                    <td>${book.tom_no}</td>
                    <td><a href="/book/${book.tom_no}?back_url=${encodeURIComponent(currentFullPath)}">${book.title}</a></td>
                    <td>${book.author || ''}</td>
                    <td>${book.publish_year || ''}</td>
                    <td>${book.genre || ''}</td>
                    <td class="text-center">
                        <a href="/edit_book/${book.tom_no}?back_url=${encodeURIComponent(currentFullPath)}" class="btn btn-sm btn-primary" title="Редактирай"><i class="bi bi-pencil-square"></i></a>
                        <form action="/delete_book/${book.tom_no}" method="post" class="d-inline" onsubmit="return confirm('Сигурни ли сте?');">
                            <button type="submit" class="btn btn-sm btn-danger" title="Изтрий"><i class="bi bi-trash-fill"></i></button>
                        </form>
                    </td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', rowHTML);
        });
    }

    function renderPagination(pagination) {
        paginationNav.innerHTML = '';
        if (pagination.total_pages <= 1) return;

        let paginationHTML = '<ul class="pagination justify-content-center flex-wrap">';
        // Previous button
        paginationHTML += `<li class="page-item ${pagination.page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${pagination.page - 1}">Предишна</a></li>`;
        
        // Page numbers
        const pageWindow = 2;
        let links = [];
        for (let p = 1; p <= pagination.total_pages; p++) {
            if (p === 1 || p === pagination.total_pages || (p >= pagination.page - pageWindow && p <= pagination.page + pageWindow)) {
                if (links.length > 0 && p > links[links.length - 1] + 1) {
                    paginationHTML += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
                paginationHTML += `<li class="page-item ${p === pagination.page ? 'active' : ''}"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`;
                links.push(p);
            }
        }

        // Next button
        paginationHTML += `<li class="page-item ${pagination.page >= pagination.total_pages ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${pagination.page + 1}">Следваща</a></li>`;
        paginationHTML += '</ul>';
        paginationNav.innerHTML = paginationHTML;
    }
    
    function updateGenres(genres) {
        genresDatalist.innerHTML = '';
        genres.forEach(genre => {
            genresDatalist.insertAdjacentHTML('beforeend', `<option value="${genre.name}">`);
        });
    }

    let debounceTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(() => {
            fetchAndRenderBooks(searchInput.value, 1); // При ново търсене винаги започваме от първа страница
        }, 300);
    });

    paginationNav.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' && e.target.dataset.page) {
            e.preventDefault();
            const page = parseInt(e.target.dataset.page);
            fetchAndRenderBooks(currentQuery, page);
        }
    });

    // Първоначално зареждане
    fetchAndRenderBooks('', 1);
});
</script>
{% endblock %}
